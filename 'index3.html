<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>दोस्ती और बातचीत</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            text-align: center;
            background: #f5f5f5;
            padding: 50px;
        }

        .box {
            background: white;
            padding: 30px;
            border-radius: 15px;
            max-width: 600px;
            margin: auto;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
        }

        button {
            background: #007bff;
            color: white;
            border: none;
            padding: 12px 25px;
            border-radius: 5px;
            cursor: pointer;
        }

        button:hover {
            background: #0056b3;
        }
    </style>
</head>
<body>

<div class="box">
    <h1>👋 स्वागत है</h1>
    <h2>हम आपका अकेलापन दूर करने की कोशिश करेंगे</h2>
    <p>यहाँ आप नए लोगों से बात कर सकते हैं और दोस्त बना सकते हैं।</p>

    <button onclick="alert('जल्द ही चैट फीचर आएगा!')">
        बात शुरू करें
    </button>
</div>

</body>
